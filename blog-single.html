<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Desi Crew - Blog Post</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700;800&family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .blog-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a1a 100%);
            padding: 80px 20px 60px;
            text-align: center;
            margin-top: 85px;
        }

        .blog-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .blog-post-date {
            font-family: 'Poppins', sans-serif;
            color: #D4AF37;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .blog-post-title {
            font-family: 'Bodoni Moda', serif;
            color: #e0e0e0;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .blog-back-btn {
            display: inline-block;
            margin-bottom: 40px;
            padding: 12px 30px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .blog-back-btn:hover {
            background: #D4AF37;
            color: #0a0a0a;
        }

        .blog-full-content {
            background: rgba(20, 20, 20, 0.5);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        @media (max-width: 768px) {
            .blog-post-title {
                font-size: 32px !important;
            }
            .blog-full-content {
                padding: 20px;
            }
        }

        /* TV View */
        @media (min-width: 2000px) {
            .blog-container { max-width: 1400px; }
            .blog-post-title { font-size: 60px !important; }
            .blog-full-content { padding: 80px; font-size: 24px; }
            .blog-post-date { font-size: 20px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container container-logo">
            <div class="logo-section">
                <a href="index.html" class="logo">
                    <img src="static/Images/logo.png" alt="Royal Desi Crew Logo" class="logo-img">
                </a>
            </div>
        </div>
        <div class="container container-nav">
            <nav class="nav" id="nav-menu">
                <a href="index.html#home">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#gallery">Our Work</a>
                <a href="index.html#packages">Pricing</a>
                <a href="index.html#about">About</a>
                <a href="blog.html" class="active">Blog</a>
            </nav>
            <!-- Hamburger Menu -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Blog Container -->
    <div class="blog-container" style="margin-top: 150px;">
        <a href="blog.html" class="blog-back-btn">← Back to All Blogs</a>

        <div id="single-blog-container">
            <!-- Blog content will be loaded dynamically here -->
            <div class="loading-spinner" style="text-align: center; padding: 100px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 50px; color: #D4AF37;"></i>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="static/api-integration.js"></script>
    <script src="static/blogs-loader.js"></script>
    <script src="static/script.js"></script>
</body>
</html>
