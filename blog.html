<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Desi Crew - Blog</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700;800&family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .blog-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a1a 100%);
            padding: 80px 20px 60px;
            text-align: center;
            margin-top: 85px;
        }

        .blog-header h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 48px;
            color: #D4AF37;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .blog-header p {
            font-family: 'Poppins', sans-serif;
            color: #e0e0e0;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .blog-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .blog-posts {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .blog-post {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(42, 42, 26, 0.8) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        .blog-post:hover {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.1);
        }

        .blog-post-date {
            font-family: 'Poppins', sans-serif;
            color: #D4AF37;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .blog-post-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 32px;
            color: #e0e0e0;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .blog-post-excerpt {
            font-family: 'Poppins', sans-serif;
            color: #b0b0b0;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .blog-post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .blog-category {
            font-family: 'Poppins', sans-serif;
            color: #D4AF37;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .read-more {
            color: #D4AF37;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .read-more:hover {
            gap: 12px;
        }

        .read-more i {
            font-size: 12px;
        }

        .blog-back-btn {
            display: inline-block;
            margin-bottom: 40px;
            padding: 12px 30px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .blog-back-btn:hover {
            background: #D4AF37;
            color: #0a0a0a;
        }

        @media (max-width: 768px) {
            .blog-header {
                padding: 60px 20px 40px;
                margin-top: 75px;
            }

            .blog-header h1 {
                font-size: 36px;
            }

            .blog-post {
                padding: 25px;
            }

            .blog-post-title {
                font-size: 24px;
            }

            .blog-post-excerpt {
                font-size: 14px;
            }
        }

        /* TV View */
        @media (min-width: 2000px) {
            .blog-container { max-width: 1600px; }
            .blog-header h1 { font-size: 80px; }
            .blog-header p { font-size: 24px; max-width: 1000px; }
            .blog-post-title { font-size: 48px; }
            .blog-post-excerpt { font-size: 20px; }
            .blog-category, .blog-post-date { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container container-logo">
            <div class="logo-section">
                <a href="index.html" class="logo">
                    <img src="static/Images/logo.png" alt="Royal Desi Crew Logo" class="logo-img">
                </a>
            </div>
        </div>
        <div class="container container-nav">
            <nav class="nav" id="nav-menu">
                <a href="index.html#home">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#gallery">Our Work</a>
                <a href="index.html#packages">Pricing</a>
                <a href="index.html#about">About</a>
                <a href="blog.html" class="active">Blog</a>
                <button class="nav-book-btn" onclick="window.location.href='index.html#contact'">Book Now</button>
            </nav>
            <!-- Hamburger Menu -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Blog Header -->
    <div class="blog-header">
        <h1>Royal Desi Crew Blog</h1>
        <p>Insights, tips, and stories from India's premier event management company</p>
    </div>

    <!-- Blog Container -->
    <div class="blog-container">
        <a href="index.html" class="blog-back-btn">← Back to Home</a>

        <div class="blog-posts">
            <!-- Blogs will be loaded dynamically here -->
            <div class="loading-spinner" style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: #D4AF37; margin-bottom: 15px;"></i>
                <p style="color: #e0e0e0;">Fetching latest stories...</p>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="static/api-integration.js"></script>
    <script src="static/blogs-loader.js"></script>
    <script src="static/script.js"></script>
</body>
</html>
